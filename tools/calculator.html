<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>计算器 - HIME Tools</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/calculator.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">🧮 计算器</h1>
            <a href="../index.html" class="back-link">← 返回主页</a>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="calculator-container">
                <div class="display">
                    <input type="text" id="display" readonly placeholder="0">
                </div>
                <div class="buttons">
                    <button class="btn btn-clear" onclick="clearDisplay()">C</button>
                    <button class="btn btn-operator" onclick="appendToDisplay('/')">/</button>
                    <button class="btn btn-operator" onclick="appendToDisplay('*')">×</button>
                    <button class="btn btn-operator" onclick="deleteLast()">⌫</button>
                    
                    <button class="btn" onclick="appendToDisplay('7')">7</button>
                    <button class="btn" onclick="appendToDisplay('8')">8</button>
                    <button class="btn" onclick="appendToDisplay('9')">9</button>
                    <button class="btn btn-operator" onclick="appendToDisplay('-')">-</button>
                    
                    <button class="btn" onclick="appendToDisplay('4')">4</button>
                    <button class="btn" onclick="appendToDisplay('5')">5</button>
                    <button class="btn" onclick="appendToDisplay('6')">6</button>
                    <button class="btn btn-operator" onclick="appendToDisplay('+')">+</button>
                    
                    <button class="btn" onclick="appendToDisplay('1')">1</button>
                    <button class="btn" onclick="appendToDisplay('2')">2</button>
                    <button class="btn" onclick="appendToDisplay('3')">3</button>
                    <button class="btn btn-equals" onclick="calculate()">=</button>
                    
                    <button class="btn btn-zero" onclick="appendToDisplay('0')">0</button>
                    <button class="btn" onclick="appendToDisplay('.')">.</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 HIME Tools. All rights reserved.</p>
        </div>
    </footer>

    <script src="../js/calculator.js"></script>
</body>
</html>
