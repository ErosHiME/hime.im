<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>子网计算器 - HIME Tools</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/subnet-calculator.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">IP计算</h1>
            <a href="../index.html" class="back-link">← 返回主页</a>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="subnet-container">
                <!-- 子网计算部分 -->
                <div class="calculator-section">
                    <h2>子网计算</h2>
                    <div class="input-header">
                        <label for="subnetInput">输入IP/CIDR:</label>
                        <div class="gateway-toggle-group">
                            <span class="toggle-label">网关为:</span>
                            <button class="btn-gateway-option active" id="gatewayFirstBtn" onclick="setGatewayPosition(false)">
                                首IP
                            </button>
                            <button class="btn-gateway-option" id="gatewayLastBtn" onclick="setGatewayPosition(true)">
                                尾IP
                            </button>
                        </div>
                    </div>
                    <div class="input-group">
                        <textarea id="subnetInput" rows="2" placeholder="192.168.1.0/24&#10;10.0.0.0/8&#10;172.16.0.0/16">192.168.1.0/24
192.168.2.0/26</textarea>
                    </div>
                    <div class="button-group">
                        <button class="btn-calculate" onclick="calculateSubnets()">批量计算</button>
                        <button class="btn-ip-binding" onclick="openIPBindingTool()">IP绑定</button>
                    </div>
                    
                    <div class="result-section" id="resultSection" style="display: none;">
                        <h3>计算结果</h3>
                        <div id="resultsContainer" class="merged-results">
                            <!-- 结果将由JavaScript生成 -->
                        </div>
                    </div>
                </div>

                <!-- 子网掩码速查表和常用子网详细信息 -->
                <div class="tables-container">
                    <div class="table-section">
                        <h2>子网掩码速查表</h2>
                        <div class="table-wrapper">
                            <table class="subnet-table">
                                <thead>
                                    <tr>
                                        <th>CIDR</th>
                                        <th>子网掩码</th>
                                        <th>总IP数</th>
                                        <th>可用主机</th>
                                    </tr>
                                </thead>
                                <tbody id="subnetTableBody">
                                    <!-- 表格内容将由JavaScript生成 -->
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- /25 到 /30 详细子网信息 -->
                    <div class="table-section">
                        <h2>常用子网详细信息</h2>
                        <div id="commonSubnetDetails">
                            <!-- 详细内容将由JavaScript生成 -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 HIME Tools. All rights reserved.</p>
        </div>
    </footer>

    <script src="../js/subnet-calculator.js"></script>
</body>
</html>
