<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>子网计算器 - HIME Tools</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/subnet-calculator.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">🌐 子网计算器</h1>
            <a href="../index.html" class="back-link">← 返回主页</a>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="subnet-container">
                <!-- 子网计算部分 -->
                <div class="calculator-section">
                    <h2>子网计算</h2>
                    <div class="input-group">
                        <label for="ipAddress">IP地址:</label>
                        <input type="text" id="ipAddress" placeholder="例如: 192.168.1.1" value="192.168.1.1">
                    </div>
                    <div class="input-group">
                        <label for="cidr">CIDR (子网掩码):</label>
                        <select id="cidr">
                            <option value="8">/8 (255.0.0.0)</option>
                            <option value="16">/16 (255.255.0.0)</option>
                            <option value="24" selected>/24 (255.255.255.0)</option>
                            <option value="25">/25 (255.255.255.128)</option>
                            <option value="26">/26 (255.255.255.192)</option>
                            <option value="27">/27 (255.255.255.224)</option>
                            <option value="28">/28 (255.255.255.240)</option>
                            <option value="29">/29 (255.255.255.248)</option>
                            <option value="30">/30 (255.255.255.252)</option>
                        </select>
                    </div>
                    <button class="btn-calculate" onclick="calculateSubnet()">计算</button>
                    
                    <div class="result-section" id="resultSection" style="display: none;">
                        <h3>计算结果</h3>
                        <div class="result-grid">
                            <div class="result-item">
                                <span class="label">网络地址:</span>
                                <span class="value" id="networkAddress">-</span>
                            </div>
                            <div class="result-item">
                                <span class="label">广播地址:</span>
                                <span class="value" id="broadcastAddress">-</span>
                            </div>
                            <div class="result-item">
                                <span class="label">子网掩码:</span>
                                <span class="value" id="subnetMask">-</span>
                            </div>
                            <div class="result-item">
                                <span class="label">可用主机数:</span>
                                <span class="value" id="usableHosts">-</span>
                            </div>
                            <div class="result-item">
                                <span class="label">第一个可用IP:</span>
                                <span class="value" id="firstUsable">-</span>
                            </div>
                            <div class="result-item">
                                <span class="label">最后一个可用IP:</span>
                                <span class="value" id="lastUsable">-</span>
                            </div>
                            <div class="result-item full-width">
                                <span class="label">IP范围:</span>
                                <span class="value" id="ipRange">-</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 子网掩码速查表 -->
                <div class="table-section">
                    <h2>子网掩码速查表</h2>
                    <div class="table-wrapper">
                        <table class="subnet-table">
                            <thead>
                                <tr>
                                    <th>CIDR</th>
                                    <th>子网掩码</th>
                                    <th>通配符掩码</th>
                                    <th>总IP数</th>
                                    <th>可用主机</th>
                                </tr>
                            </thead>
                            <tbody id="subnetTableBody">
                                <!-- 表格内容将由JavaScript生成 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 HIME Tools. All rights reserved.</p>
        </div>
    </footer>

    <script src="../js/subnet-calculator.js"></script>
</body>
</html>
