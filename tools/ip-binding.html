<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP批量绑定生成器 - HIME Tools | Windows/Linux 网络配置工具</title>
    <meta name="description" content="在线IP批量绑定工具，支持Windows CMD/PowerShell、CentOS 7及Debian 12网络配置命令一键生成。提供子网掩码速查与详细子网信息计算。">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/ip-binding.css">
</head>
<body>
    <main class="main">
        <div class="container subnet-container">
            <article class="calculator-section">
                <h2>IP绑定配置生成器</h2>
                
                <!-- 悬浮提示 -->
                <div id="toast" class="toast"></div>
                
                <div class="input-header">
                    <label for="subnetInput">输入IP/CIDR地址:</label>
                    <div class="gateway-toggle-group">
                        <span class="toggle-label">网关位置:</span>
                        <button type="button" class="btn-gateway-option active" id="gatewayFirstBtn" onclick="setGatewayPosition(false)">
                            首IP
                        </button>
                        <button type="button" class="btn-gateway-option" id="gatewayLastBtn" onclick="setGatewayPosition(true)">
                            尾IP
                        </button>
                    </div>
                </div>
                <div class="input-group">
                    <textarea id="subnetInput" rows="3" placeholder="支持格式：192.168.1.0/24 或 192.168.1.2-254 或 192.168.1.2-192.168.1.254" autocomplete="off">192.168.1.0/24
本地IP：192.168.2.0/26
网络1: 192.168.3.0/27</textarea>
                </div>
                
                <fieldset class="os-selection">
                    <legend class="os-label">操作系统</legend>
                    <div class="os-options">
                        <label class="os-option">
                            <input type="radio" name="os" value="windows" checked>
                            <span>Windows</span>
                        </label>
                        <label class="os-option">
                            <input type="radio" name="os" value="centos7">
                            <span>CentOS 7</span>
                        </label>
                        <label class="os-option">
                            <input type="radio" name="os" value="debian12">
                            <span>Debian 12</span>
                        </label>
                        <label class="os-option">
                            <input type="radio" name="os" value="ubuntu">
                            <span>Ubuntu</span>
                        </label>
                    </div>
                </fieldset>
                
                <div class="nic-selection" id="nicSelection" style="display: none;">
                    <label class="os-label" for="localConnectionSelect">网卡名称</label>
                    <div class="nic-inputs" id="windowsNicInputs">
                        <select id="localConnectionSelect" class="nic-select nic-active">
                            <option value="本地连接">本地连接</option>
                            <option value="本地连接2">本地连接2</option>
                            <option value="本地连接3">本地连接3</option>
                            <option value="本地连接4">本地连接4</option>
                        </select>
                        
                        <select id="ethernetSelect" class="nic-select">
                            <option value="以太网">以太网</option>
                            <option value="以太网2">以太网2</option>
                            <option value="以太网3">以太网3</option>
                            <option value="以太网4">以太网4</option>
                        </select>
                        
                        <input type="text" id="customNicInput" class="nic-input" placeholder="自定义网卡名称" autocomplete="off">
                    </div>
                    
                    <div class="nic-inputs" id="linuxNicInputs" style="display: none;">
                        <select id="enoSelect" class="nic-select nic-active">
                            <option value="eno1">eno1</option>
                            <option value="eno2">eno2</option>
                            <option value="eno3">eno3</option>
                            <option value="eno4">eno4</option>
                        </select>
                        
                        <select id="ethSelect" class="nic-select">
                            <option value="eth0">eth0</option>
                            <option value="eth1">eth1</option>
                            <option value="eth2">eth2</option>
                            <option value="eth3">eth3</option>
                        </select>
                        
                        <input type="text" id="customLinuxNicInput" class="nic-input" placeholder="自定义网卡名称" autocomplete="off">
                    </div>
                </div>
                
                <div class="button-group">
                    <button type="button" class="btn-calculate" onclick="generateIPBinding()">生成配置</button>
                </div>
                
                <section class="result-section" id="resultSection" style="display: none;">
                    <h3>生成的配置信息</h3>
                    <div id="configContainer" class="merged-results">
                        <!-- 配置信息将由JavaScript生成 -->
                    </div>
                </section>
                
                <!-- 子网查询内容容器 -->
                <aside id="subnetQueryContainer">
                    <div class="tables-container">
                        <!-- 子网掩码速查表 -->
                        <section class="table-section">
                            <h2>子网掩码</h2>
                            <div class="table-wrapper">
                                <table class="subnet-table">
                                    <thead>
                                        <tr>
                                            <th scope="col">CIDR</th>
                                            <th scope="col">子网掩码</th>
                                            <th scope="col">总IP数</th>
                                            <th scope="col">可用主机</th>
                                        </tr>
                                    </thead>
                                    <tbody id="subnetTableBody">
                                        <!-- 表格内容将由JavaScript生成 -->
                                    </tbody>
                                </table>
                            </div>
                        </section>

                        <!-- /25 到 /30 详细子网信息 -->
                        <section class="table-section">
                            <h2>子网划分</h2>
                            <div id="commonSubnetDetails">
                                <!-- 详细内容将由JavaScript生成 -->
                            </div>
                        </section>
                    </div>
                </aside>
            </article>
        </div>
    </main>

    <script src="../js/components.js" defer></script>
    <script src="../js/ip-binding.js" defer></script>
</body>
</html>
