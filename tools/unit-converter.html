<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单位转换器 - HIME Tools</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/unit-converter.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">📏 单位转换器</h1>
            <a href="../index.html" class="back-link">← 返回主页</a>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="converter-container">
                <div class="category-selector">
                    <label for="category">选择转换类型：</label>
                    <select id="category" onchange="updateUnits()">
                        <option value="length">长度</option>
                        <option value="weight">重量</option>
                        <option value="temperature">温度</option>
                        <option value="area">面积</option>
                    </select>
                </div>

                <div class="conversion-box">
                    <div class="input-group">
                        <label for="fromValue">从：</label>
                        <input type="number" id="fromValue" placeholder="输入数值" oninput="convert()">
                        <select id="fromUnit" onchange="convert()">
                            <!-- 动态填充 -->
                        </select>
                    </div>

                    <div class="equals-sign">=</div>

                    <div class="input-group">
                        <label for="toValue">到：</label>
                        <input type="number" id="toValue" placeholder="结果" readonly>
                        <select id="toUnit" onchange="convert()">
                            <!-- 动态填充 -->
                        </select>
                    </div>
                </div>

                <button class="btn-swap" onclick="swapUnits()">⇄ 交换单位</button>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 HIME Tools. All rights reserved.</p>
        </div>
    </footer>

    <script src="../js/unit-converter.js"></script>
</body>
</html>
