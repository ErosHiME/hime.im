<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密码生成器 - HIME Tools | 安全随机密码在线生成工具</title>
    <meta name="description" content="免费在线密码生成器，支持自定义长度、字符类型（大小写字母、数字、特殊字符），一键生成高强度安全密码。">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/password-generator.css">
</head>
<body>
    <main class="main">
        <div class="container password-container">
            <article class="generator-section">
                <h2>&#128274; 密码生成器</h2>
                
                <!-- 悬浮提示 -->
                <div id="toast" class="toast"></div>
                
                <!-- 双列布局容器 -->
                <div class="two-column-layout">
                    <!-- 左列：密码显示和操作按钮 -->
                    <section class="left-column">
                        <div class="password-output">
                            <textarea id="passwordOutput" rows="10" readonly placeholder="生成的密码将显示在这里..." autocomplete="off"></textarea>
                        </div>
                        <div class="password-actions">
                            <button type="button" class="btn-action btn-generate-inline" onclick="generatePasswords()">
                                <span class="btn-icon">&#9889;</span>
                                生成密码
                            </button>
                            <button type="button" class="btn-action btn-copy" onclick="copyPasswords()">
                                <span class="btn-icon">&#128203;</span>
                                复制全部
                            </button>
                            <button type="button" class="btn-action btn-clear" onclick="clearPasswords()">
                                <span class="btn-icon">&#128465;</span>
                                清空
                            </button>
                        </div>
                    </section>
                    
                    <!-- 右列：配置选项 -->
                    <section class="right-column">
                        <div class="config-row">
                            <label for="passwordLength">密码长度:</label>
                            <div class="length-control">
                                <input type="range" id="passwordLength" min="4" max="128" value="16" oninput="updateLengthDisplay()">
                                <span id="lengthValue" class="length-value">16</span>
                            </div>
                        </div>
                        
                        <div class="config-row">
                            <label for="passwordCount">生成数量:</label>
                            <div class="count-control">
                                <input type="number" id="passwordCount" min="1" max="50" value="5" autocomplete="off">
                            </div>
                        </div>
                        
                        <fieldset class="charset-options">
                            <legend class="charset-label">字符选项:</legend>
                            <div class="charset-grid">
                                <label class="charset-option">
                                    <input type="checkbox" id="includeUppercase" checked>
                                    <span class="option-text">大写字母 (A-Z)</span>
                                </label>
                                <label class="charset-option">
                                    <input type="checkbox" id="includeLowercase" checked>
                                    <span class="option-text">小写字母 (a-z)</span>
                                </label>
                                <label class="charset-option">
                                    <input type="checkbox" id="includeNumbers" checked>
                                    <span class="option-text">数字 (0-9)</span>
                                </label>
                                <label class="charset-option">
                                    <input type="checkbox" id="includeSymbols" checked>
                                    <span class="option-text">特殊字符 (!@#$%^&*)</span>
                                </label>
                                <label class="charset-option">
                                    <input type="checkbox" id="excludeSimilar" checked>
                                    <span class="option-text">排除相似字符 (0O, 1lI)</span>
                                </label>
                                <label class="charset-option">
                                    <input type="checkbox" id="excludeAmbiguous" checked>
                                    <span class="option-text">排除歧义字符 ({ } [ ] / \ ' ` , ; : . ~)</span>
                                </label>
                                <label class="charset-option">
                                    <input type="checkbox" id="requireAllTypes" checked>
                                    <span class="option-text">确保包含所有选中的字符类型</span>
                                </label>
                            </div>
                        </fieldset>
                    </section>
                </div>
            </article>
            
            <!-- UUID生成器 -->
            <article class="generator-section uuid-section">
                <h2>&#128273; UUID 生成器</h2>
                
                <!-- 双列布局容器 -->
                <div class="two-column-layout">
                    <!-- 左列：UUID显示和操作按钮 -->
                    <section class="left-column">
                        <div class="password-output">
                            <textarea id="uuidOutput" rows="10" readonly placeholder="生成的 UUID 将显示在这里..." autocomplete="off"></textarea>
                        </div>
                        <div class="password-actions">
                            <button type="button" class="btn-action btn-generate-inline" onclick="generateUUIDs()">
                                <span class="btn-icon">&#9889;</span>
                                生成 UUID
                            </button>
                            <button type="button" class="btn-action btn-copy" onclick="copyUUIDs()">
                                <span class="btn-icon">&#128203;</span>
                                复制全部
                            </button>
                            <button type="button" class="btn-action btn-clear" onclick="clearUUIDs()">
                                <span class="btn-icon">&#128465;</span>
                                清空
                            </button>
                        </div>
                    </section>
                    
                    <!-- 右列：配置选项 -->
                    <section class="right-column">
                        <div class="config-row">
                            <label for="uuidVersion">UUID 版本:</label>
                            <div class="version-control">
                                <select id="uuidVersion" class="version-select">
                                    <option value="4" selected>UUID v4 (随机)</option>
                                    <option value="1">UUID v1 (时间戳)</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="config-row">
                            <label for="uuidCount">生成数量:</label>
                            <div class="count-control">
                                <input type="number" id="uuidCount" min="1" max="100" value="5" autocomplete="off">
                            </div>
                        </div>
                        
                        <fieldset class="charset-options">
                            <legend class="charset-label">格式选项:</legend>
                            <div class="charset-grid">
                                <label class="charset-option">
                                    <input type="checkbox" id="uuidUppercase">
                                    <span class="option-text">大写字母 (A-F)</span>
                                </label>
                                <label class="charset-option">
                                    <input type="checkbox" id="uuidWithBraces">
                                    <span class="option-text">添加花括号 { }</span>
                                </label>
                                <label class="charset-option">
                                    <input type="checkbox" id="uuidNoDashes">
                                    <span class="option-text">移除连字符 (-)</span>
                                </label>
                            </div>
                        </fieldset>
                    </section>
                </div>
            </article>
        </div>
    </main>

    <script src="../js/components.js" defer></script>
    <script src="../js/password-generator.js" defer></script>
</body>
</html>
