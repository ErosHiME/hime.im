<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <main class="main">
        <div class="container">
            <div class="tools-grid">
                <!-- 计算器 -->
                <a href="tools/calculator.html" class="tool-card">

                <a href="tools/color-picker.html" class="tool-card">
                    <div class="tool-icon">🎨</div>
                    <h3 class="tool-title">颜色选择器</h3>
